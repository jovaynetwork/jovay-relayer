name: CI

on:
  push:
    branches: [ master, main, release-** ]
    tags: [ '[0-9]+.[0-9]+.[0-9]+', '[0-9]+.[0-9]+.[0-9]+-**' ]
  pull_request:
    branches: [ master, main, release-** ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with JaCoCo coverage
        run: mvn verify -Pcoverage -B

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/**/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          title: 'Code Coverage Report'
          update-comment: true

  release:
    name: Build & Release Docker Images
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and package
        run: mvn clean package -DskipTests -B

      - name: Upload Relayer artifact
        uses: actions/upload-artifact@v4
        with:
          name: l2-relayer-tar
          path: relayer-app/target/l2-relayer-*.tar.gz
          retention-days: 30

      - name: Upload Query Service artifact
        uses: actions/upload-artifact@v4
        with:
          name: query-service-tar
          path: query-service/target/query-service-*.tar.gz
          retention-days: 30

      - name: Prepare Docker build context
        run: |
          cp relayer-app/target/l2-relayer-*.tar.gz docker/l2-relayer.tar.gz
          cp query-service/target/query-service-*.tar.gz docker/query-service.tar.gz

      - name: Determine image tags
        id: meta
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          RELAYER_IMAGE="${REGISTRY}/${REPO_OWNER}/jovay-relayer"
          QS_IMAGE="${REGISTRY}/${REPO_OWNER}/jovay-relayer-query-service"

          TAGS_RELAYER="${RELAYER_IMAGE}:${{ github.sha }},${RELAYER_IMAGE}:${{ github.ref_name }},${RELAYER_IMAGE}:latest"
          TAGS_QS="${QS_IMAGE}:${{ github.sha }},${QS_IMAGE}:${{ github.ref_name }},${QS_IMAGE}:latest"

          echo "relayer_tags=${TAGS_RELAYER}" >> "$GITHUB_OUTPUT"
          echo "qs_tags=${TAGS_QS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Relayer image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile-Relayer-Open
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.relayer_tags }}

      - name: Build & push Query Service image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile-QS-Open
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.qs_tags }}
